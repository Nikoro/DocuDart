name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docudart/**'
      - 'lib/**'
      - 'bin/**'
      - 'pubspec.yaml'
      - 'CHANGELOG.md'
      - 'README.md'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Install dependencies
        run: dart pub get --no-example

      - name: Build documentation site
        run: dart run bin/docudart.dart build

      - name: Add CNAME for custom domain
        run: echo "docudart.dev" > docudart/build/web/CNAME

      - name: Download badge
        run: curl -sL "https://img.shields.io/badge/docs-DocuDart-1FBCFE.svg?logoColor=white&logo=data:image/svg+xml;base64," -o docudart/build/web/badge.svg

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docudart/build/web/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
