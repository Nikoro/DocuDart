name: docudart
description: A static documentation generator for Dart, powered by Jaspr.
version: 0.0.1
repository: https://github.com/Nikoro/docudart
issue_tracker: https://github.com/Nikoro/docudart/issues

environment:
  sdk: ^3.10.0

executables:
  docudart: docudart

topics:
  - documentation
  - static-site-generator
  - dart
  - jaspr

dependencies:
  args: ^2.7.0
  glob: ^2.1.3
  jaspr: ^0.22.3
  markdown: ^7.3.0
  meta: ^1.18.1
  opal: ^0.2.2
  path: ^1.9.1
  universal_web: ^1.1.1
  watcher: ^1.2.1
  yaml: ^3.1.3

dev_dependencies:
  lints: ^6.1.0
  test: ^1.30.0
  xml: ^6.6.1
