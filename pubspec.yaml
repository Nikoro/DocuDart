name: docudart
description: A static documentation generator for Dart, powered by Jaspr.
version: 0.0.1
repository: https://github.com/Nikoro/docudart
issue_tracker: https://github.com/Nikoro/docudart/issues

environment:
  sdk: ^3.10.0

executables:
  docudart: docudart

dependencies:
  args: ^2.7.0
  path: ^1.9.1
  glob: ^2.1.3
  watcher: ^1.2.1
  yaml: ^3.1.3
  markdown: ^7.3.0
  jaspr: ^0.22.2
  collection: ^1.19.1
  meta: ^1.18.1

dev_dependencies:
  lints: ^6.1.0
  test: ^1.29.0
